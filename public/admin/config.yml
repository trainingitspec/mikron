backend:
  name: github
  repo: trainingitspec/mikron
  branch: main
  # Замініть цей URL на адресу вашого згенерованого OAuth-сервера на Vercel
  base_url: https://mikron-auth.vercel.app 
  auth_endpoint: auth

media_folder: "public/uploads"
public_folder: "/uploads"

# Глобальні налаштування локалізації для Decap CMS
i18n:
    structure: multiple_files
    locales: [ua, en]
    default_locale: ua

collections:
  - name: "blog"
    label: "Блог"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    # Вмикаємо i18n для колекції Блог
    i18n: true
    fields:
      - { label: "Заголовок", name: "title", widget: "string", i18n: true }
      - { label: "Дата публікації", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, i18n: false }
      - { label: "Автор", name: "author", widget: "string", i18n: false }
      - { label: "Обкладинка", name: "featured_image", widget: "image", required: false, i18n: false }
      - { label: "Короткий опис", name: "excerpt", widget: "text", i18n: true }
      - { label: "Текст", name: "body", widget: "markdown", i18n: true }

  - name: "products"
    label: "Продукти"
    folder: "content/products"
    format: "yaml" # Зберігатиме суто як конфіг-файл без markdown
    create: true
    slug: "{{slug}}"
    # Вмикаємо i18n для колекції Продукти
    i18n: true
    fields:
      - { label: "Назва", name: "name", widget: "string", i18n: true }
      - { label: "Ціна (UAH)", name: "price", widget: "number", i18n: false }
      - { label: "Опис", name: "description", widget: "text", i18n: true }
      - { label: "Зображення", name: "image", widget: "image", i18n: false }
      - label: "Категорія"
        name: "category"
        widget: "select"
        i18n: false
        options:
          - { label: "Операційні системи", value: "Операційні системи" }
          - { label: "Аналітика", value: "Аналітика" }
          - { label: "Безпека", value: "Безпека" }
          - { label: "DevOps", value: "DevOps" }
      - { label: "Рекомендований", name: "featured", widget: "boolean", default: false, i18n: false }