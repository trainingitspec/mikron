backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

locale: 'uk'

collections:
  - name: "blog"
    label: "Блог"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Дата публікації", name: "date", widget: "datetime" }
      - { label: "Автор", name: "author", widget: "string" }
      - { label: "Обкладинка", name: "featured_image", widget: "image", required: false }
      - { label: "Короткий опис", name: "excerpt", widget: "text" }
      - { label: "Текст", name: "body", widget: "markdown" }

  - name: "products"
    label: "Продукти"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Назва", name: "name", widget: "string" }
      - { label: "Ціна (UAH)", name: "price", widget: "number" }
      - { label: "Опис", name: "description", widget: "text" }
      - { label: "Зображення", name: "image", widget: "image" }
      - label: "Категорія"
        name: "category"
        widget: "select"
        options:
          - { label: "Операційні системи", value: "Операційні системи" }
          - { label: "Аналітика", value: "Аналітика" }
          - { label: "Безпека", value: "Безпека" }
          - { label: "DevOps", value: "DevOps" }
      - { label: "Рекомендований", name: "featured", widget: "boolean", default: false }
